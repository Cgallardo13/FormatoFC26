# Netlify Configuration for FC26 Team Finder
# This file fixes CORS issues with external APIs

[[redirects]]
  # Proxy MSMC API through Netlify to avoid CORS
  from = "/api/teams"
  to = "https://api.msmc.cc/eafc/teams"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  # Proxy MSMC API root
  from = "/api/eafc"
  to = "https://api.msmc.cc/eafc/"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  # Proxy Gemini API (optional, for production)
  from = "/api/gemini"
  to = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"
  status = 200
  force = true

# CORS Headers for API responses
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    X-Content-Type-Options = "nosniff"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
